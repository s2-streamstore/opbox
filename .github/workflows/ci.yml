name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, Test, Sim
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --locked --workspace --all-targets

      - name: Test workspace
        run: cargo test --locked --workspace --all-targets

      - name: Run DST sweep
        run: cargo run --locked -p opbox-sim -- sweep --trials 1 --jobs 1 --child-proc-log-level warn

      - name: Run trace-level meta test
        run: cargo run --locked -p opbox-sim -- meta same-file-split-edits --seed 1 --max-steps 500 --child-proc-log-level trace
